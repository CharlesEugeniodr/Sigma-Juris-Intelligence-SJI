# Alembic Configuration — SJIF
# Sigma—Juris Intelligence Framework

[alembic]
# path to migration scripts
script_location = alembic

# template used to generate migration file names
# file_template = %%(rev)s_%%(slug)s

# sys.path to prepend for "env.py" (project root so "server.*" imports work)
prepend_sys_path = .

# Sync driver — Alembic does not support async drivers directly.
# The app uses sqlite+aiosqlite:///./sjif.db; here we use the sync equivalent.
sqlalchemy.url = sqlite:///./sjif.db

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
