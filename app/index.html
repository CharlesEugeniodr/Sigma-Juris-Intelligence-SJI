<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sigma Juris Intelligence Framework — Plataforma premium de inteligência jurídica com análise automatizada de documentos legais, classificação taxonômica e insights estratégicos.">
    <title>SJIF — Sigma Juris Intelligence Framework</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&family=Montserrat:wght@100;200;300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

    <!-- Styles -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <div id="app">

        <!-- ═══════════════════════════════════════════
             LOGIN PAGE
             ═══════════════════════════════════════════ -->
        <div id="login-page" style="display:none">
            <div class="login-container">
                <div class="login-card">
                    <div class="login-logo">
                        <svg class="sigma-icon" viewBox="0 0 48 48" width="56" height="56" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <rect width="48" height="48" rx="12" fill="url(#login-grad)"/>
                            <path d="M14 14h20l-10 10 10 10H14l10-10L14 14z" fill="#0F2027" stroke="#0F2027" stroke-width="1.5" stroke-linejoin="round"/>
                            <defs>
                                <linearGradient id="login-grad" x1="0" y1="0" x2="48" y2="48">
                                    <stop stop-color="#D4AF37"/>
                                    <stop offset="1" stop-color="#F2D06B"/>
                                </linearGradient>
                            </defs>
                        </svg>
                        <h1 class="login-brand">Sigma Juris</h1>
                        <p class="login-subtitle">Intelligence Framework</p>
                    </div>
                    <form id="login-form" autocomplete="off">
                        <div class="form-group">
                            <label for="login-email">E-mail</label>
                            <input type="email" id="login-email" class="input" placeholder="seu@email.com" required>
                        </div>
                        <div class="form-group">
                            <label for="login-password">Senha</label>
                            <input type="password" id="login-password" class="input" placeholder="••••••••" required>
                        </div>
                        <button type="submit" class="btn btn-primary btn-lg" style="width:100%">Entrar</button>
                        <p class="login-footer-text">Acesso restrito a usuários autorizados.</p>
                    </form>
                </div>
            </div>
        </div>

        <!-- ═══════════════════════════════════════════
             MAIN APPLICATION
             ═══════════════════════════════════════════ -->
        <div id="main-app" style="display:none">

            <!-- Sidebar -->
            <aside id="sidebar">
                <div class="sidebar-top">
                    <div class="sidebar-logo">
                        <svg class="sigma-icon" viewBox="0 0 40 40" width="40" height="40" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <rect width="40" height="40" rx="10" fill="url(#sidebar-grad)"/>
                            <path d="M12 12h16l-8 8 8 8H12l8-8-8-8z" fill="#0F2027" stroke="#0F2027" stroke-width="1.2" stroke-linejoin="round"/>
                            <defs>
                                <linearGradient id="sidebar-grad" x1="0" y1="0" x2="40" y2="40">
                                    <stop stop-color="#D4AF37"/>
                                    <stop offset="1" stop-color="#F2D06B"/>
                                </linearGradient>
                            </defs>
                        </svg>
                        <div class="sidebar-brand">
                            <span class="sidebar-brand-name">Sigma Juris</span>
                            <span class="sidebar-brand-sub">Intelligence</span>
                        </div>
                    </div>

                    <nav class="sidebar-nav">
                        <a href="#/dashboard" class="sidebar-nav-item active" data-page="dashboard">
                            <span class="sidebar-nav-icon">📊</span>
                            <span class="sidebar-nav-label">Dashboard</span>
                        </a>
                        <a href="#/upload" class="sidebar-nav-item" data-page="upload">
                            <span class="sidebar-nav-icon">📤</span>
                            <span class="sidebar-nav-label">Upload &amp; Análise</span>
                        </a>
                        <a href="#/documents" class="sidebar-nav-item" data-page="documents">
                            <span class="sidebar-nav-icon">📄</span>
                            <span class="sidebar-nav-label">Documentos</span>
                        </a>
                        <a href="#/processes" class="sidebar-nav-item" data-page="processes">
                            <span class="sidebar-nav-icon">⚖️</span>
                            <span class="sidebar-nav-label">Processos</span>
                        </a>
                        <a href="#/taxonomy" class="sidebar-nav-item" data-page="taxonomy">
                            <span class="sidebar-nav-icon">🏷️</span>
                            <span class="sidebar-nav-label">Taxonomia</span>
                        </a>
                        <a href="#/mij" class="sidebar-nav-item" data-page="mij" style="border-top:1px solid var(--border);margin-top:8px;padding-top:16px">
                            <span class="sidebar-nav-icon">🧠</span>
                            <span class="sidebar-nav-label" style="display:flex;align-items:center;gap:6px">Inteligência Judicial <span style="font-size:0.55rem;background:linear-gradient(135deg,rgba(212,175,55,0.2),rgba(212,175,55,0.05));color:var(--gold);padding:2px 6px;border-radius:4px">PRO</span></span>
                        </a>
                        <a href="#/settings" class="sidebar-nav-item" data-page="settings">
                            <span class="sidebar-nav-icon">⚙️</span>
                            <span class="sidebar-nav-label">Configurações</span>
                        </a>
                    </nav>
                </div>

                <div class="sidebar-bottom">
                    <div class="sidebar-user">
                        <div class="avatar" id="sidebar-avatar">SJ</div>
                        <div class="sidebar-user-info">
                            <span class="sidebar-user-name" id="sidebar-user-name">Usuário</span>
                            <span class="sidebar-user-role" id="sidebar-user-role">Analista</span>
                        </div>
                    </div>
                    <button class="btn btn-outline btn-sm" id="btn-logout" style="width:100%">
                        🚪 Sair
                    </button>
                </div>
            </aside>

            <!-- Main Content Area -->
            <main id="main-content">
                <header id="topbar">
                    <div class="topbar-left">
                        <h2 class="topbar-title" id="topbar-title">Dashboard</h2>
                        <nav class="breadcrumb" id="breadcrumb">
                            <span class="breadcrumb-item">Início</span>
                            <span class="breadcrumb-separator">›</span>
                            <span class="breadcrumb-item active">Dashboard</span>
                        </nav>
                    </div>
                    <div class="topbar-right">
                        <div class="search-input-wrapper">
                            <svg class="search-icon" viewBox="0 0 20 20" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="8.5" cy="8.5" r="5.5"/>
                                <line x1="13" y1="13" x2="18" y2="18"/>
                            </svg>
                            <input type="text" class="search-input" id="global-search" placeholder="Buscar documentos, processos…">
                        </div>
                        <button class="topbar-icon-btn" id="btn-notifications" aria-label="Notificações">
                            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                                <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
                            </svg>
                            <span class="notification-dot" id="notification-dot"></span>
                        </button>
                    </div>
                </header>

                <div id="page-container">
                    <!-- Pages render here -->
                </div>
            </main>
        </div>

        <!-- ═══════════════════════════════════════════
             TOAST CONTAINER
             ═══════════════════════════════════════════ -->
        <div id="toast-container"></div>

        <!-- ═══════════════════════════════════════════
             MODAL OVERLAY
             ═══════════════════════════════════════════ -->
        <div id="modal-overlay">
            <div class="modal" id="modal">
                <div class="modal-header">
                    <h3 class="modal-title" id="modal-title">Modal</h3>
                    <button class="modal-close" id="modal-close">&times;</button>
                </div>
                <div class="modal-body" id="modal-body"></div>
                <div class="modal-footer" id="modal-footer">
                    <button class="btn btn-secondary" id="modal-cancel">Cancelar</button>
                    <button class="btn btn-primary" id="modal-confirm">Confirmar</button>
                </div>
            </div>
        </div>

    </div><!-- /#app -->

    <!-- ═══════════════════════════════════════════
         JS MODULES (load order matters)
         ═══════════════════════════════════════════ -->
    <script src="js/taxonomy.js"></script>
    <script src="js/store.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/analyzer.js"></script>
    <script src="js/classifier.js"></script>
    <script src="js/charts.js"></script>

    <!-- Page modules -->
    <script src="js/pages/login.js"></script>
    <script src="js/pages/dashboard.js"></script>
    <script src="js/pages/upload.js"></script>
    <script src="js/pages/documents.js"></script>
    <script src="js/pages/analysis.js"></script>
    <script src="js/pages/processes.js"></script>
    <script src="js/pages/taxonomy-page.js"></script>
    <script src="js/pages/settings.js"></script>

    <!-- MIJ Module (Premium) -->
    <script src="js/pages/mij-dashboard.js"></script>
    <script src="js/pages/mij-magistrados.js"></script>
    <script src="js/pages/mij-simulador.js"></script>

    <!-- App bootstrap (must be last) -->
    <script src="js/app.js"></script>

</body>
</html>
