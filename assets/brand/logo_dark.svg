<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="goldGradientDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#F2D06B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D4AF37;stop-opacity:1" />
    </linearGradient>
    <filter id="goldGlowDark">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  
  <!-- Dark background -->
  <rect width="400" height="120" rx="4" fill="#0F2027"/>
  
  <!-- Subtle grid pattern -->
  <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
    <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#1A3A4A" stroke-width="0.3"/>
  </pattern>
  <rect width="400" height="120" fill="url(#grid)" opacity="0.3"/>
  
  <!-- Sigma Symbol -->
  <g transform="translate(15, 20)" filter="url(#goldGlowDark)">
    <path d="M 8 8 L 48 8 L 48 14 L 22 14 L 38 40 L 22 66 L 48 66 L 48 72 L 8 72 L 28 40 Z" 
          fill="url(#goldGradientDark)" stroke="none"/>
    <line x1="28" y1="72" x2="28" y2="82" stroke="#D4AF37" stroke-width="2" stroke-linecap="round"/>
    <line x1="16" y1="82" x2="40" y2="82" stroke="#D4AF37" stroke-width="2" stroke-linecap="round"/>
    <path d="M 13 82 C 13 90 23 90 23 82" stroke="url(#goldGradientDark)" stroke-width="1.2" fill="none"/>
    <path d="M 33 82 C 33 90 43 90 43 82" stroke="url(#goldGradientDark)" stroke-width="1.2" fill="none"/>
  </g>
  
  <!-- Decorative line -->
  <line x1="80" y1="30" x2="80" y2="90" stroke="url(#goldGradientDark)" stroke-width="1" opacity="0.4"/>
  
  <!-- Main Text: SIGMA -->
  <text x="95" y="62" font-family="'Playfair Display', 'Georgia', serif" font-size="42" font-weight="700" fill="#E0E4E5" letter-spacing="0.05em">SIGMA</text>
  
  <!-- Subtitle -->
  <text x="97" y="82" font-family="'Montserrat', 'Helvetica Neue', sans-serif" font-size="12" font-weight="300" fill="#D4AF37" letter-spacing="0.35em">JURIS INTELLIGENCE</text>
  
  <!-- Gold underline -->
  <line x1="97" y1="87" x2="285" y2="87" stroke="url(#goldGradientDark)" stroke-width="0.8" opacity="0.4"/>
</svg>
