version: '3.8'

services:
  backend:
    build: .
    ports:
      - "5000:5000"
    volumes:
      - ./sjif.db:/app/sjif.db
    environment:
      - SJIF_DATABASE_URL=sqlite+aiosqlite:///./sjif.db
      - SJIF_SECRET_KEY=use-a-strong-secret-in-production
      - SJIF_DATAJUD_API_KEY=${SJIF_DATAJUD_API_KEY:-}
    restart: always

  # Exemplo de proxy reverso Nginx (opcional, para servir HTTPS e frontend no futuro)
