version: '3.8'

services:
  backend:
    build: .
    volumes:
      - sjif-data:/app/data
    environment:
      - SJIF_DATABASE_URL=sqlite+aiosqlite:///./data/sjif.db
      - SJIF_SECRET_KEY=${SJIF_SECRET_KEY:-mude-esta-chave-em-producao}
      - SJIF_DATAJUD_API_KEY=${SJIF_DATAJUD_API_KEY:-}
    restart: always

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./app:/usr/share/nginx/html/app
      - ./assets:/usr/share/nginx/html/assets
      - ./index.html:/usr/share/nginx/html/index.html
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/www/certbot
    depends_on:
      - backend
    restart: always

  # Descomente para gerar certificado SSL automaticamente:
  # certbot:
  #   image: certbot/certbot
  #   volumes:
  #     - certbot-etc:/etc/letsencrypt
  #     - certbot-var:/var/www/certbot
  #   command: certonly --webroot --webroot-path=/var/www/certbot --email seu@email.com -d sigmajuris.com.br -d www.sigmajuris.com.br --agree-tos --no-eff-email

volumes:
  sjif-data:
  certbot-etc:
  certbot-var:
